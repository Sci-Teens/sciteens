name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: pnpm lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  rules-tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # firebase-tools' bundled Firestore emulator requires a JDK; the
      # `firebase-tools` version pinned in package.json needs 21+.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Firestore emulator binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: firebase-emulators-${{ runner.os }}-
      - run: pnpm test:rules

  e2e-tests:
    name: E2E tests (emulator project)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      - name: Cache Firestore emulator binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: firebase-emulators-${{ runner.os }}-
      # GitHub-hosted runners have 7GB RAM and no swap. The Firestore
      # emulator JVM, next dev, and Chromium together peak above that
      # during teardown, triggering an OOM SIGKILL after all tests pass.
      # 4GB swap gives headroom for the spike without slowing tests
      # (working set fits in RAM; only teardown touches swap).
      - uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 4
      # "live" project needs real Firebase secrets, not wired in CI yet.
      - run: npx playwright test --project=emulator
